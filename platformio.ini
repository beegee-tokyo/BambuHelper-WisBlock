; BambuHelper - Bambu Lab Printer Monitor
; Supports ESP32-S3 Super Mini, ESP32-2432S028 (CYD), ESP32-C3 Super Mini

; --- Shared library dependencies ---
[common]
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

; =============================================================================
;  ESP32-S3 Super Mini + ST7789 240x240
; =============================================================================
[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32s3\"
    -D BOARD_IS_S3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=13
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
;  ESP32-2432S028 (CYD - Cheap Yellow Display) + ILI9341 240x320
;  Two hardware variants exist (ILI9341 vs ILI9341_2). Panel selection is
;  handled at runtime via the "Alternative CYD panel" checkbox in Settings.
; =============================================================================
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 230400
board_build.partitions = min_spiffs.csv
lib_deps =
    ${common.lib_deps}
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
    ; --- CYD touch (XPT2046 on separate SPI bus) ---
    -D USE_XPT2046=1
    -D TOUCH_CS=33
    -D TOUCH_IRQ=36
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    -D SPI_TOUCH_FREQUENCY=2500000
    ; --- Layout profile ---
    -D DISPLAY_CYD=1
    -D DISPLAY_240x320=1
    -D BOARD_VARIANT=\"cyd\"
    -D ENABLE_OTA_AUTO=1
    -D BOARD_LOW_RAM=1
    -D BACKLIGHT_PIN=21

; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-2 (2.0" ST7789 240x320)
;  https://www.waveshare.com/esp32-s3-touch-lcd-2.htm
; =============================================================================
[env:ws_lcd_200]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"ws_lcd_200\"
    -D BOARD_IS_WS200=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=1
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Layout profile (same 240x320 as CYD) ---
    -D DISPLAY_240x320=1
    ; --- Touch (CST816D on I2C) ---
    -D USE_CST816=1
    -D CST816_SDA=48
    -D CST816_SCL=47

; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-1.54 (1.54" ST7789 240x240)
;  https://docs.waveshare.net/ESP32-S3-Touch-LCD-1.54/
; =============================================================================
[env:ws_lcd_154]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"ws_lcd_154\"
    -D BOARD_IS_WS154=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=46
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Battery power-hold (AXP2101) ---
    -D BAT_EN=2
    ; --- Built-in buttons (from Waveshare button example) ---
    -D BOARD_BTN_1=0
    -D BOARD_BTN_2=5
    -D BOARD_BTN_3=4
    ; --- Built-in speaker (ES8311 codec + I2S + PA) ---
    -D BOARD_HAS_ES8311_AUDIO=1
    -D AUDIO_I2C_ADDR=0x18
    -D AUDIO_I2C_SDA=42
    -D AUDIO_I2C_SCL=41
    -D AUDIO_I2S_PORT=0
    -D AUDIO_I2S_MCLK=8
    -D AUDIO_I2S_BCLK=9
    -D AUDIO_I2S_LRC=10
    -D AUDIO_I2S_DOUT=12
    -D AUDIO_PA_CTRL=7
    ; --- Touch (CST816 on I2C, shared bus with ES8311) ---
    -D USE_CST816=1
    -D CST816_SDA=42
    -D CST816_SCL=41
    -D CST816_RST=47
    -D CST816_IRQ=48

; =============================================================================
;  ESP32-C3 Super Mini + ST7789 240x240
; =============================================================================
[env:esp32c3]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32c3\"
    -D BOARD_IS_C3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=5
    ; --- USB Serial (C3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_LOW_RAM=1
