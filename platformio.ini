; BambuHelper - Bambu Lab Printer Monitor
; Supports ESP32-S3 Super Mini, ESP32-S3-Zero, ESP32-2432S028 (CYD), ESP32-C3 Super Mini, SenseCAP Indicator
; Supports ESP32-S3 RAK3112 and RAK14014 TFT display

; --- PlatformIO global settings ---
[platformio]
; Repo-local board manifest for SenseCAP Indicator (not in upstream PlatformIO)
boards_dir = boards
default_envs = 
; 	esp32s3
; 	cyd
; 	esp32c3
; 	ws_lcd_200
;   sensecap_indicator
	rak3312

; --- Shared library dependencies ---
[common]
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

; =============================================================================
;  RAK3312 ESP32-S3 with 320x240 TFT Touch display
; =============================================================================
[env:rak3312]
platform = espressif32
board = rak3112
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_8mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
	beegee-tokyo/RAK14014-FT6336U
build_flags =
	-I rakwireless/variants/rak3112
	-D _VARIANT_RAK3112_=1
    -D BOARD_VARIANT=\"rak3312\"
    -D BOARD_IS_RAK3312=1
	-D DISPLAY_240x320=1
    -D BACKLIGHT_PIN=WB_IO3
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; RAK3312/RAK14014 specific
	-D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -D _INTERNAL_ADD_ON_=1 ; Use if ESP32 with door and temperature sensor is installed inside the P1S
    ; --- Battery sense (ADC on GPIO1) ---
    -D BOARD_HAS_BATTERY=1
    -D BOARD_HAS_BAT_ADC=1
    -D BAT_ADC_PIN=WB_A0
    ; Top resistor 1M from schematic; bottom resistor 1.5M from schematic. Which
    ; corresponds to 1.5M/1M = 1.5x divider).
	-D BAT_VOLT_DIVIDER=1.5f

; =============================================================================
;  ESP32-S3 Super Mini + ST7789 240x240 
; =============================================================================
[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32s3\"
    -D BOARD_IS_S3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=13
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
;  ESP32-2432S028 (CYD - Cheap Yellow Display) + ILI9341 240x320
;  Two hardware variants exist (ILI9341 vs ILI9341_2). Panel selection is
;  handled at runtime via the "Alternative CYD panel" checkbox in Settings.
; =============================================================================
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 230400
board_build.partitions = min_spiffs.csv
lib_deps =
    ${common.lib_deps}
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
    ; --- CYD touch (XPT2046 on separate SPI bus) ---
    -D USE_XPT2046=1
    -D TOUCH_CS=33
    -D TOUCH_IRQ=36
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    -D SPI_TOUCH_FREQUENCY=2500000
    ; --- Layout profile ---
    -D DISPLAY_CYD=1
    -D DISPLAY_240x320=1
    -D BOARD_VARIANT=\"cyd\"
    -D ENABLE_OTA_AUTO=1
    -D BOARD_LOW_RAM=1
    -D BACKLIGHT_PIN=21

; =============================================================================
;  Waveshare ESP32-S3-Zero + external ST7789 240x240
;  https://www.waveshare.com/esp32-s3-zero.htm
;  Module ESP32-S3FH4R2: 4MB flash QIO + 2MB PSRAM QSPI (quad).
;  Built-in WS2812 RGB LED is on GPIO21 - do not use GPIO21 for external LED.
; =============================================================================
[env:esp32s3_zero]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32s3_zero\"
    -D BOARD_IS_S3=1
    -D BOARD_IS_S3_ZERO=1
    -D BOARD_HAS_PSRAM
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=13
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-2 (2.0" ST7789 240x320)
;  https://www.waveshare.com/esp32-s3-touch-lcd-2.htm
; =============================================================================
[env:ws_lcd_200]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"ws_lcd_200\"
    -D BOARD_IS_WS200=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=1
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Layout profile (same 240x320 as CYD) ---
    -D DISPLAY_240x320=1
    ; --- Touch (CST816D on I2C) ---
    -D USE_CST816=1
    -D CST816_SDA=48
    -D CST816_SCL=47
    ; --- Battery sense (ADC on GPIO5 with 3x voltage divider) ---
    -D BOARD_HAS_BATTERY=1
    -D BOARD_HAS_BAT_ADC=1
    -D BAT_ADC_PIN=5

; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-1.54 (1.54" ST7789 240x240)
;  https://docs.waveshare.net/ESP32-S3-Touch-LCD-1.54/
; =============================================================================
[env:ws_lcd_154]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"ws_lcd_154\"
    -D BOARD_IS_WS154=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=46
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Battery power-hold + VBAT sense via ADC on GPIO1 ---
    ; Per schematic: VBAT routed through 160k/1% divider to GPIO1 (BAT_ADC).
    ; The board has NO I2C-readable PMIC - the charger (ETA6098) is standalone.
    ; Other I2C devices on 42/41 are: 0x15 CST816T touch, 0x18 ES8311 audio,
    ; 0x40 ES7210 audio ADC, 0x6B QMI8658 IMU.
    -D BAT_EN=2
    -D BOARD_HAS_BATTERY=1
    -D BOARD_HAS_BAT_ADC=1
    -D BAT_ADC_PIN=1
    ; Top resistor confirmed 160K/1% from schematic; bottom resistor is
    ; not legible in the extracted schematic text. Empirical fit: a
    ; charged battery reads as 100% only with a 3.0x multiplier (which
    ; corresponds to 160K + 80K bottom = 240K/80K = 3.0x divider).
    -D BAT_VOLT_DIVIDER=3.0f
    ; --- Built-in buttons (from Waveshare button example) ---
    -D BOARD_BTN_1=0
    -D BOARD_BTN_2=5
    -D BOARD_BTN_3=4
    ; --- Built-in speaker (ES8311 codec + I2S + PA) ---
    -D BOARD_HAS_ES8311_AUDIO=1
    -D AUDIO_I2C_ADDR=0x18
    -D AUDIO_I2C_SDA=42
    -D AUDIO_I2C_SCL=41
    -D AUDIO_I2S_PORT=0
    -D AUDIO_I2S_MCLK=8
    -D AUDIO_I2S_BCLK=9
    -D AUDIO_I2S_LRC=10
    -D AUDIO_I2S_DOUT=12
    -D AUDIO_PA_CTRL=7
    ; --- Touch (CST816 on I2C, shared bus with ES8311) ---
    -D USE_CST816=1
    -D CST816_SDA=42
    -D CST816_SCL=41
    -D CST816_RST=47
    -D CST816_IRQ=48

; =============================================================================
;  ESP32-C3 Super Mini + ST7789 240x240
; =============================================================================
[env:esp32c3]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32c3\"
    -D BOARD_IS_C3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=5
    ; --- USB Serial (C3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_LOW_RAM=1

; =============================================================================
;  SenseCAP Indicator (Seeed INDICATOR RP2040) + ST7701S 480x480 RGB
;  ESP32-S3 + RP2040 dual-MCU, 8MB flash, octal PSRAM
;  ST7701S display via SPI init + LCD_CAM RGB, FT5X06 touch, PCA9535PW IO expander
; =============================================================================
[env:sensecap_indicator]
platform = espressif32
board = seeed_sensecap_indicator
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_8mb.csv
board_build.arduino.memory_type = qio_opi
platform_packages =
    ; Custom arduino-esp32 fork with TCA9535 IO expander support (based on 2.0.16)
    ; Required for SenseCAP Indicator � display CS/RST are on the TCA9535 expander
    platformio/framework-arduinoespressif32 @ https://github.com/mverch67/arduino-esp32/archive/aef7fef6de3329ed6f75512d46d63bba12b09bb5.zip
lib_deps =
    https://github.com/mverch67/LovyanGFX/archive/4c76238c1344162a234ae917b27651af146d6fb2.zip
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
build_flags =
    -D BOARD_VARIANT=\"sensecap_indicator\"
    -D BOARD_IS_SENSECAP=1
    -D DISPLAY_480x480=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=45
    -D IO_EXPANDER=0x40
    -D USE_ARDUINO_HAL_GPIO
    -D USE_FT5X06
    -D TOUCH_SLAVE_ADDRESS=0x48
    -D BOARD_BTN_1=38
    -D ARDUINO_USB_CDC_ON_BOOT=0
