; BambuHelper - Bambu Lab P1S Printer Monitor
; ESP32-S3 Super Mini + 1.54" TFT ST7789 (240x240)

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_qspi

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bodmer/TFT_eWidget@^0.0.6
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

build_flags =
    ; --- TFT_eSPI ST7789 configuration via build flags ---
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    ; --- SPI pins (ESP32-S3 DevKitC-1 wiring) ---
    -D TFT_MOSI=11
    -D TFT_SCLK=12
    -D TFT_CS=10
    -D TFT_DC=9
    -D TFT_RST=14
    -D TFT_BL=13
    ; --- SPI port selection (ESP32-S3 needs explicit FSPI) ---
    -D USE_FSPI_PORT=1
    ; --- No touch screen ---
    -D DISABLE_ALL_LIBRARY_WARNINGS=1
    ; --- SPI speed and fonts ---
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
