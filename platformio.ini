; BambuHelper - Bambu Lab Printer Monitor
; Supports ESP32-S3 Super Mini and ESP32-C3 Super Mini
; Supports ESP32-S3 RAK3112 and RAK14014 TFT display

[platformio]
default_envs = 
	esp32s3
	rak3312
boards_dir = rakwireless/boards

; --- Shared library dependencies ---
[common]
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bodmer/TFT_eWidget@^0.0.6
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

; --- Shared TFT_eSPI + font flags ---
common_flags =
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D DISABLE_ALL_LIBRARY_WARNINGS=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
	-D SW_VERSION_1=2
	-D SW_VERSION_2=3

; =============================================================================
;  ESP32-S3 Super Mini
; =============================================================================
[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    ${common.common_flags}
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- SPI pins (S3 Super Mini) ---
    -D TFT_MOSI=11  ;SDA
    -D TFT_SCLK=12  ;SCL
    -D TFT_CS=10
    -D TFT_DC=9
    -D TFT_RST=8  ;14
    -D TFT_BL=13
    -D USE_FSPI_PORT=1

; =============================================================================
;  RAK3312 ESP32-S3
; =============================================================================
[env:rak3312]
platform = espressif32
board = rak3112
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
	beegee-tokyo/RAK14014-FT6336U
build_flags =
    ${common.common_flags}
	-I rakwireless/variants/rak3112
	-D _VARIANT_RAK3112_=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
	-D TFT_RGB_ORDER=0
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=50000000
 	-D SUPPORT_TRANSACTIONS=1
   ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- SPI pins (RAK3112) ---
	-D TFT_MISO=PIN_SPI_MISO
	-D TFT_MOSI=PIN_SPI_MOSI
	-D TFT_SCLK=PIN_SPI_SCK
	-D TFT_CS=SPI_CS
	-D TFT_DC=WB_IO4
	-D TFT_RST=WB_IO5
	-D TFT_BL=WB_IO3
    -D USE_FSPI_PORT=1
	-D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
extra_scripts = 
	merge_bins_rak3312.py